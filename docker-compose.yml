services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
    env_file:
      - path: ./backend/.env
        required: false

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000}
    ports:
      - "3000:80"
    depends_on:
      - backend
